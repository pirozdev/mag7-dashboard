.hdr-sub{display:flex;gap:12px;margin-top:5px;font-size:11px;color:var(--t3);flex-wrap:wrap;align-items:center}
.pill{background:var(--bg4);padding:2px 7px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.3px}

.tabs{display:flex;border-bottom:1px solid var(--brd);background:var(--bg2);overflow-x:auto;padding:0 20px;gap:0}
.tab{padding:11px 15px;cursor:pointer;font-size:11px;font-weight:600;color:var(--t3);border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;font-family:'JetBrains Mono',monospace;letter-spacing:.4px}
.tab:hover{color:var(--t2);background:rgba(255,255,255,.015)}
.tab.on{color:var(--blu);border-bottom-color:var(--blu);background:rgba(77,166,255,.04)}

.tab.cyan{color:var(--cyan)}.tab.cyan.on{border-bottom-color:var(--cyan)}

.card{background:var(--bg3);border:1px solid var(--brd);border-radius:7px;padding:11px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blu),var(--prp))}
.card-lbl{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px}
.card-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700}
.card-chg{font-size:9px;margin-top:2px;font-family:'JetBrains Mono',monospace}
.card-chg.p{color:var(--grn)}.card-chg.n{color:var(--red)}
.card-src{font-size:7px;color:var(--t3);margin-top:2px}

.sec{margin-bottom:22px}
.sh{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2);margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--brd)}
/* Tables */
.tw{overflow-x:auto;border:1px solid var(--brd);border-radius:7px}
table{width:100%;border-collapse:collapse;font-size:10px}
th{text-align:left;padding:6px 8px;background:var(--bg4);color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;font-size:8px;border-bottom:1px solid var(--brd);font-family:'JetBrains Mono',monospace}
td{padding:6px 8px;border-bottom:1px solid rgba(40,44,60,.4);font-family:'JetBrains Mono',monospace;font-size:10px}
tr:hover td{background:rgba(77,166,255,.02)}
.p{color:var(--grn)}.n{color:var(--red)}

.bb{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.bull{background:var(--grn2);border:1px solid rgba(0,212,126,.18);border-radius:7px;padding:13px}
.bear{background:var(--red2);border:1px solid rgba(255,71,87,.18);border-radius:7px;padding:13px}
.arg{margin-bottom:5px;padding:4px 8px;background:rgba(0,0,0,.18);border-radius:4px;font-size:10px;line-height:1.35}

.ec-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ec-box{background:var(--bg3);border:1px solid var(--brd);border-radius:7px;padding:12px}
.ec-h{font-size:10px;line-height:1.35;margin-bottom:3px;padding-left:9px;border-left:2px solid var(--blu)}
.ec-q{font-size:9px;line-height:1.35;margin-bottom:4px;padding:3px 6px;background:rgba(0,0,0,.12);border-radius:3px}
.ec-guid{margin-top:7px;padding:5px 7px;background:rgba(240,185,11,.08);border:1px solid rgba(240,185,11,.15);border-radius:4px;font-size:8px;color:var(--gld)}
/* Sentiment */
.sent-box{background:var(--bg3);border:1px solid var(--brd);border-radius:7px;padding:12px}
.sent-sum{font-size:10px;line-height:1.45;margin-bottom:8px;padding:7px;background:rgba(0,0,0,.15);border-radius:4px}

.verdict{background:var(--bg3);border:1px solid var(--brd);border-radius:7px;padding:13px;margin-top:12px}
/* Ranking cards */
.rank{background:var(--bg3);border:1px solid var(--brd);border-radius:7px;padding:14px}
.rank h3{font-size:11px;margin-bottom:7px}

.port-bar{display:flex;height:28px;border-radius:5px;overflow:hidden;margin:8px 0}
.port-seg{display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#fff;min-width:20px}

@media(max-width:900px){.main{padding:12px}.bb{grid-template-columns:1fr}.ec-grid{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}}

function init(D) {
  // Disclaimer
  document.getElementById('discDetail').innerHTML = D.meta.disclaimer + '<br><b>Sources:</b> ' + D.meta.sources.join(', ') + '. Data as of ' + D.meta.date + '.';
  // Header
  document.getElementById('hdrSub').innerHTML = '<span>Data: ' + D.meta.date + '</span>' +
    '<span class="pill">3+ SOURCES</span><span class="pill">EARNINGS CALLS</span><span class="pill">20 FINTWIT</span><span class="pill">3 PORTFOLIOS</span>';

  var tickers = Object.keys(D.companies);
  var tabsEl = document.getElementById('tabs');

  // Build tabs
  tickers.forEach(function(t, i) {
    var d = document.createElement('div');
    d.className = 'tab' + (i === 0 ? ' on' : '');
    d.dataset.t = t;
    d.textContent = t;
    tabsEl.appendChild(d);
  });
  ['COMPARE','FINTWIT','PORTFOLIOS'].forEach(function(t, i) {
    var d = document.createElement('div');
    d.className = 'tab ' + (i === 0 ? 'gold' : i === 1 ? 'cyan' : 'prp');
    d.dataset.t = t;
    d.textContent = t === 'COMPARE' ? '⚡ COMPARE' : t === 'FINTWIT' ? '🐦 FINTWIT 20' : '📊 PORTFOLIOS';
    tabsEl.appendChild(d);
  });

  var mainEl = document.getElementById('main');

  function go(t) {
    var allTabs = document.querySelectorAll('.tab');
    for (var i = 0; i < allTabs.length; i++) allTabs[i].classList.remove('on');
    var el = document.querySelector('[data-t="' + t + '"]');
    if (el) el.classList.add('on');

    if (t === 'COMPARE') mainEl.innerHTML = renderCompare(D, tickers);
    else if (t === 'FINTWIT') mainEl.innerHTML = renderFintwit(D);
    else if (t === 'PORTFOLIOS') mainEl.innerHTML = renderPortfolios(D, tickers);
    else mainEl.innerHTML = renderCompany(t, D.companies[t]);
    window.scrollTo(0, 0);
  }

  tabsEl.onclick = function(e) {
    if (e.target.classList.contains('tab')) go(e.target.dataset.t);
  };

  go(tickers[0]);
}

function badge(high) { return high ? '<span class="hi">HIGH</span>' : '<span class="md">MED</span>'; }

function sparkline(quarters) {
  var vals = quarters.map(function(q) { return parseFloat(q.rev.replace(/[^0-9.]/g, '')); });
  var mx = Math.max.apply(null, vals);
  return '<div class="spark">' + vals.map(function(v) {
    return '<div style="height:' + Math.max((v / mx) * 100, 4) + '%"></div>';
  }).join('') + '</div>';
}

// ===== PORTFOLIOS TAB =====
function renderPortfolios(D, tickers) {
  var h = '<div style="font-family:Playfair Display,serif;font-size:18px;font-weight:900;margin-bottom:14px">&#128202; Three Blind Portfolio Analyses</div>';
  h += '<div style="font-size:11px;color:var(--t2);margin-bottom:16px;padding:8px;background:var(--bg3);border-radius:5px;border:1px solid var(--brd)">' +
       '<b>Methodology:</b> Three independent analyses conducted blind (each without seeing the others). ' +
       'Each portfolio represents a different macro thesis and risk appetite. Allocations sum to 100% across the 8 stocks only. ' +
       'This is NOT investment advice &#8212; it is a structured thought exercise.</div>';

  Object.keys(D.portfolios).forEach(function(key, idx) {
    var p = D.portfolios[key];
    h += '<div class="sec"><div class="sh">' + ['&#x1F7E2;','&#x1F7E1;','&#x1F534;'][idx] + ' Analysis ' + (idx + 1) + ': ' + p.name + '</div>';

    h += '<div style="font-size:11px;font-weight:700;margin-bottom:4px">' + p.thesis + '</div>';
    // Bar
    h += '<div class="port-bar">';
    var sortedAlloc = Object.keys(p.allocation).sort(function(a, b) { return p.allocation[b] - p.allocation[a]; });
    sortedAlloc.forEach(function(t, i) {
      var pct = p.allocation[t];
      h += '<div class="port-seg" style="width:' + pct + '%;background:' + COLORS[i % COLORS.length] + '">' + (pct >= 6 ? t + ' ' + pct + '%' : pct + '%') + '</div>';
    });
    h += '</div>';
    // Table
    h += '<div class="tw" style="margin-top:8px"><table><thead><tr><th>Ticker</th><th>Weight</th><th>Fwd P/E</th><th>PEG</th><th>Rev Growth</th></tr></thead><tbody>';
    sortedAlloc.forEach(function(t) {
      var c = D.companies[t];
      var lq = c.quarters[c.quarters.length - 1];
      h += '<tr><td style="font-weight:700;color:var(--blu)">' + t + '</td>';
      h += '<td style="font-weight:700">' + p.allocation[t] + '%</td>';

      h += '<td class="' + (lq.gr.indexOf('-') >= 0 ? 'n' : 'p') + '">' + lq.gr + '</td></tr>';

    h += '<div style="margin-top:8px;font-size:10px;line-height:1.5;color:var(--t2)">' + p.rationale + '</div>';
    h += '</div></div>';
  });
  return h;
}
